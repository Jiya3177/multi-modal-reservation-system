services:
  - type: pserv
    name: ors-mysql
    runtime: docker
    plan: starter
    dockerContext: ./render/mysql
    envVars:
      - key: MYSQL_DATABASE
        value: ors_db
      - key: MYSQL_USER
        value: ors_user
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_ROOT_PASSWORD
        sync: false
    disk:
      name: ors-mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 10

  - type: web
    name: ors-web
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DB_HOST
        fromService:
          name: ors-mysql
          type: pserv
          property: host
      - key: DB_PORT
        fromService:
          name: ors-mysql
          type: pserv
          property: port
      - key: DB_NAME
        value: ors_db
      - key: DB_USER
        value: ors_user
      - key: DB_PASSWORD
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_SECURE
        value: "true"
      - key: MAIL_FROM
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: FAST2SMS_API_KEY
        sync: false
      - key: FAST2SMS_ROUTE
        value: q
      - key: FAST2SMS_LANGUAGE
        value: english
